<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA2 SRWE – Entraînement Complet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>

:root{--bg:#080c18;--s1:#0f1623;--s2:#161f32;--s3:#1c2844;--border:#1e3356;--accent:#00d4ff;--a2:#7c3aed;--a3:#06d6a0;--warn:#f59e0b;--err:#ef4444;--ok:#10b981;--text:#e2e8f0;--muted:#64748b;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* ===== LOGIN ===== */
#loginPage{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
#loginPage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(0,212,255,.08) 0%,transparent 70%)}
.login-box{position:relative;z-index:1;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:3rem 2.5rem;width:min(420px,90vw);text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.login-logo{font-size:3rem;margin-bottom:1rem}
.login-title{font-size:1.6rem;font-weight:800;color:var(--accent);margin-bottom:.3rem}
.login-sub{font-size:.85rem;color:var(--muted);margin-bottom:2rem}
.login-input-wrap{position:relative;margin-bottom:1rem}
.login-input{width:100%;padding:.9rem 1rem .9rem 3rem;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:.9rem;outline:none;transition:all .2s}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.login-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}
.login-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--accent),var(--a2));border:none;border-radius:10px;color:#000;font-family:var(--sans);font-size:.95rem;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,255,.3)}
.login-err{color:var(--err);font-size:.82rem;margin-top:.5rem;font-family:var(--mono);display:none}
.login-hint{color:var(--muted);font-size:.75rem;margin-top:1rem;font-family:var(--mono)}

/* ===== APP SHELL ===== */
#app{display:none;flex-direction:column;height:100vh}
#app.visible{display:flex}

/* ===== TOP NAV ===== */
.topnav{position:sticky;top:0;z-index:100;background:rgba(8,12,24,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;padding:0 1.5rem;height:60px;flex-shrink:0}
.nav-logo{font-size:.95rem;font-weight:800;color:var(--accent);letter-spacing:-.01em;margin-right:.5rem;white-space:nowrap}
.nav-logo span{color:var(--text)}
.nav-exams{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none}
.nav-exams::-webkit-scrollbar{display:none}
.nav-btn{padding:.4rem .8rem;border-radius:6px;border:none;cursor:pointer;font-family:var(--sans);font-size:.72rem;font-weight:700;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap;letter-spacing:.03em}
.nav-btn.active{background:var(--accent);color:#000}
.nav-btn:hover:not(.active){background:var(--s3);color:var(--text)}
.nav-score{font-family:var(--mono);font-size:.75rem;color:var(--accent);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:.3rem .7rem;border-radius:20px;white-space:nowrap;margin-left:auto;flex-shrink:0}

/* ===== MAIN LAYOUT ===== */
.main{display:grid;grid-template-columns:220px 1fr;flex:1;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;padding:1rem .6rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-title{font-size:.65rem;font-weight:800;letter-spacing:.15em;color:var(--muted);padding:.3rem .6rem;margin-bottom:.3rem}
.sidebar-item{padding:.55rem .7rem;border-radius:7px;cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:.5rem;border-left:2px solid transparent}
.sidebar-item:hover{color:var(--text);background:var(--s3)}
.sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,212,255,.06)}
.sidebar-item.done{color:var(--ok)}
.sidebar-item .badge{margin-left:auto;font-family:var(--mono);font-size:.6rem;background:var(--s3);padding:.1rem .4rem;border-radius:10px}

/* ===== CONTENT ===== */
.content{overflow-y:auto;padding:1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ===== EXAM HEADER ===== */
.exam-header{margin-bottom:1.5rem}
.exam-title{font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
.exam-title .tag{font-size:.62rem;font-weight:700;letter-spacing:.1em;padding:.2rem .5rem;border-radius:20px;margin-right:.5rem;vertical-align:middle;background:rgba(0,212,255,.15);color:var(--accent);font-family:var(--mono)}
.exam-meta{color:var(--muted);font-size:.82rem;display:flex;align-items:center;gap:1rem}
.progress-row{display:flex;align-items:center;gap:.8rem;margin-top:1rem}
.progress-bar-wrap{flex:1;background:var(--s2);border-radius:6px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:6px;transition:width .4s}
.progress-text{font-family:var(--mono);font-size:.72rem;color:var(--muted);white-space:nowrap}

/* ===== QUESTION CARD ===== */
.qcard{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qcard-num{font-family:var(--mono);font-size:.65rem;color:var(--accent);letter-spacing:.15em;margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.qcard-num::after{content:'';flex:1;height:1px;background:var(--border)}
.qcard-multi-tag{font-size:.6rem;background:rgba(124,58,237,.2);color:#a78bfa;padding:.15rem .5rem;border-radius:10px;font-weight:700}
.qcard-text{font-size:.9rem;font-weight:600;line-height:1.65;margin-bottom:1rem}
.qcard-img{margin:.6rem 0 1rem;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#070b14}
.qcard-img img{display:block;width:100%;max-height:320px;object-fit:contain;background:#070b14;transition:opacity .3s}
.qcard-img img.err{display:none}
.qcard-img .img-fallback{display:none;padding:1.8rem 1.2rem;background:linear-gradient(135deg,rgba(10,14,24,.95),rgba(22,31,50,.95));flex-direction:column;align-items:center;gap:.7rem;text-align:center}
.qcard-img img.err~.img-fallback{display:flex}
.img-fb-icon{font-size:2.2rem;opacity:.55}
.img-fb-title{font-family:var(--mono);font-size:.8rem;color:var(--warn);font-weight:700;letter-spacing:.05em}
.img-fb-desc{font-size:.78rem;color:var(--muted);line-height:1.6;max-width:380px}
.img-fb-link{font-size:.72rem;color:var(--accent);text-decoration:none;font-family:var(--mono);border:1px solid rgba(0,212,255,.25);padding:.3rem .8rem;border-radius:6px;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem}
.img-fb-link:hover{background:rgba(0,212,255,.08);border-color:var(--accent)}
.qcard-img-cap{padding:.35rem .8rem;font-size:.66rem;color:var(--muted);font-family:var(--mono);border-top:1px solid var(--border);display:flex;align-items:center;gap:.4rem}
.sidebar-item.lessons-sb.active{color:#a78bfa;border-left-color:#a78bfa;background:rgba(124,58,237,.06)}
.nav-btn.lessons-nb.active{background:var(--a2);color:#fff}

/* ===== OPTIONS ===== */
.opts{display:flex;flex-direction:column;gap:.45rem}
.opt{padding:.75rem 1rem;border-radius:9px;border:1px solid var(--border);background:var(--s2);cursor:pointer;font-size:.85rem;line-height:1.5;display:flex;align-items:flex-start;gap:.7rem;text-align:left;color:var(--text);width:100%;font-family:var(--sans);transition:all .15s}
.opt:hover:not(.disabled){border-color:var(--accent);background:rgba(0,212,255,.05)}
.opt.sel{border-color:var(--accent);background:rgba(0,212,255,.1)}
.opt.correct{border-color:var(--ok);background:rgba(16,185,129,.1);color:#6ee7b7}
.opt.wrong{border-color:var(--err);background:rgba(239,68,68,.1);color:#fca5a5}
.opt.disabled{cursor:not-allowed}
.opt-ic{min-width:22px;height:22px;border-radius:5px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.65rem;font-weight:700;flex-shrink:0}
.chk{min-width:16px;height:16px;border-radius:3px;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;margin-top:2px}
.opt.sel .chk{background:var(--accent);border-color:var(--accent);color:#000}
.opt.correct .chk{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong .chk{background:var(--err);border-color:var(--err);color:#fff}

/* ===== FEEDBACK ===== */
.feedback{margin-top:.8rem;padding:.8rem 1rem;border-radius:9px;font-size:.83rem;line-height:1.6;display:none;animation:fadeUp .2s ease}
.feedback.show{display:block}
.feedback.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:#a7f3d0}
.feedback.ko{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fecaca}
.feedback-title{font-weight:800;margin-bottom:.3rem;font-size:.88rem}

/* ===== ACTIONS ===== */
.qcard-actions{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.2rem}
.btn-val{padding:.55rem 1.3rem;border-radius:7px;border:none;cursor:pointer;font-family:var(--sans);font-size:.82rem;font-weight:700;background:var(--accent);color:#000;transition:all .15s}
.btn-val:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,212,255,.25)}
.btn-val:disabled{opacity:.35;cursor:not-allowed}
.btn-next{padding:.55rem 1.3rem;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);font-size:.82rem;font-weight:700;background:var(--s2);color:var(--text);transition:all .15s;display:none}
.btn-next.show{display:block}
.btn-next:hover{border-color:var(--accent);color:var(--accent)}

/* ===== RESULTS ===== */
.results{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:2.5rem;text-align:center;max-width:480px;margin:2rem auto;animation:fadeUp .4s ease}
.res-emoji{font-size:3.5rem;margin-bottom:.8rem}
.res-score{font-size:3.5rem;font-weight:800;color:var(--accent);font-family:var(--mono)}
.res-pct{color:var(--muted);margin-bottom:1.5rem;font-size:.88rem}
.res-stars{font-size:1.8rem;margin-bottom:1.2rem;letter-spacing:.15rem}
.res-msg{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.btn-restart{padding:.7rem 1.8rem;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:.88rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;transition:all .2s}
.btn-restart:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,255,.2)}

/* ===== DASHBOARD ===== */
.dashboard{max-width:900px}
.dash-hero{text-align:center;padding:2rem 0 2.5rem}
.dash-hero h1{font-size:2rem;font-weight:800;margin-bottom:.5rem}
.dash-hero h1 span{color:var(--accent)}
.dash-hero p{color:var(--muted);font-size:.9rem}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-top:1.5rem}
.dash-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.3rem 1.4rem;cursor:pointer;transition:all .2s}
.dash-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.dash-card-tag{font-size:.62rem;font-weight:700;letter-spacing:.1em;font-family:var(--mono);padding:.2rem .5rem;border-radius:10px;display:inline-block;margin-bottom:.6rem}
.tag-cp{background:rgba(0,212,255,.15);color:var(--accent)}
.tag-pf{background:rgba(245,158,11,.15);color:var(--warn)}
.tag-fi{background:rgba(6,214,160,.15);color:var(--a3)}
.dash-card h3{font-size:.95rem;font-weight:700;margin-bottom:.3rem}
.dash-card p{font-size:.78rem;color:var(--muted)}
.dash-card .dash-stats{display:flex;gap:1rem;margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border)}
.dash-stat{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.dash-stat span{color:var(--text);font-weight:700}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .sidebar{display:none}
  .topnav{padding:0 .8rem}
  .content{padding:1rem}
  .nav-logo{font-size:.8rem}
}


/* ===== LESSONS ===== */
.lessons-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:100%;overflow:hidden}
.lessons-nav{background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;padding:.8rem .5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.lessons-nav-title{font-size:.6rem;font-weight:800;letter-spacing:.15em;color:var(--muted);padding:.3rem .6rem;margin:.4rem 0 .2rem}
.lnav-item{padding:.5rem .7rem;border-radius:6px;cursor:pointer;font-size:.75rem;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:.4rem;border-left:2px solid transparent;line-height:1.3}
.lnav-item:hover{color:var(--text);background:var(--s3)}
.lnav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,212,255,.06)}
.lnav-chapter{padding:.4rem .5rem .4rem 1.4rem;border-radius:5px;cursor:pointer;font-size:.72rem;color:var(--muted);transition:all .15s;border-left:1px solid transparent}
.lnav-chapter:hover{color:var(--text);background:var(--s3)}
.lnav-chapter.active{color:#a78bfa;border-left-color:#a78bfa;background:rgba(124,58,237,.06)}
.lessons-content{overflow-y:auto;padding:1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.lesson-section{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.2rem;animation:fadeUp .25s ease}
.lesson-section h2{font-size:1.2rem;font-weight:800;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.lesson-section h2 .mod-tag{font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:.2rem .5rem;border-radius:10px;background:rgba(0,212,255,.15);color:var(--accent);font-family:var(--mono);margin-right:.5rem;vertical-align:middle}
.lesson-section h3{font-size:.95rem;font-weight:700;color:var(--accent);margin:1.2rem 0 .6rem}
.lesson-section p{font-size:.85rem;line-height:1.7;color:#cbd5e1;margin-bottom:.7rem}
.lesson-section ul,.lesson-section ol{padding-left:1.2rem;margin-bottom:.7rem}
.lesson-section li{font-size:.85rem;line-height:1.7;color:#cbd5e1;margin-bottom:.25rem}
.lesson-section strong{color:var(--text)}
.ls-code{background:#070b14;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:.9rem 1.1rem;font-family:var(--mono);font-size:.75rem;line-height:1.7;color:#79c0ff;margin:.7rem 0;overflow-x:auto;white-space:pre}
.ls-table-wrap{overflow-x:auto;margin:.7rem 0}
.ls-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ls-table th{background:var(--s2);padding:.5rem .7rem;text-align:left;color:var(--accent);font-family:var(--mono);font-size:.7rem;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.ls-table td{padding:.5rem .7rem;border-bottom:1px solid rgba(30,58,95,.4);color:#cbd5e1;vertical-align:top}
.ls-table tr:hover td{background:rgba(255,255,255,.015)}
.ls-box{padding:.9rem 1.1rem;border-radius:9px;margin:.7rem 0;font-size:.83rem;line-height:1.6}
.ls-box.blue{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:#a5f3fc}
.ls-box.green{background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.2);color:#6ee7b7}
.ls-box.orange{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.ls-box.red{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.ls-box strong{color:inherit}
.ls-abbr{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:.8rem 1rem;margin:.7rem 0}
.ls-abbr>div{display:flex;align-items:flex-start;gap:.7rem;padding:.3rem 0;border-bottom:1px solid rgba(30,58,95,.3);font-size:.8rem;color:#94a3b8;line-height:1.5}
.ls-abbr>div:last-child{border-bottom:none}
.ls-abbr span{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--accent);background:rgba(0,212,255,.1);padding:.1rem .5rem;border-radius:4px;white-space:nowrap;flex-shrink:0}
@media(max-width:768px){.lessons-layout{grid-template-columns:1fr}.lessons-nav{display:flex;flex-wrap:wrap;gap:3px;border-right:none;border-bottom:1px solid var(--border);padding:.5rem}.lnav-item{border-left:none;border-bottom:2px solid transparent;padding:.4rem .6rem}.lnav-item.active{border-bottom-color:var(--accent);border-left:none}.lnav-chapter{display:none}}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🎓</div>
    <div class="login-title">CCNA2 SRWE</div>
    <div class="login-sub">Site d'entraînement — Accès sécurisé</div>
    <div class="login-input-wrap">
      <span class="login-icon">🔒</span>
      <input class="login-input" type="password" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <button class="login-btn" onclick="tryLogin()">Se connecter</button>
    <div class="login-err" id="loginErr">❌ Mot de passe incorrect</div>
    <div class="login-hint">Indice : ccna + numéro de la certification</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="topnav">
    <div class="nav-logo">CCNA2 <span>SRWE</span></div>
    <div class="nav-exams" id="navExams">
    <button class="nav-btn" onclick="showLessonsPage()" id="nav-lessons">📚 Leçons</button>
  </div>
    <div class="nav-score" id="navScore">🏆 0 pts</div>
  </nav>
  <div class="main">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
  </div>
</div>

<script>
// ==================== AUTH ====================
function tryLogin(){
  const v=document.getElementById('pwdInput').value.trim();
  if(v==='ccna2'){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
  }
}

// ==================== DATA ====================

const EXAMS = [
  {
    id:'m14',
    tag:'CHECKPOINT',
    tagClass:'tag-cp',
    title:'Modules 1–4 : Commutation, VLAN & Inter-VLAN',
    short:'Mods 1–4',
    questions: [
      {q:"Quelle commande définit la variable d'environnement BOOT sur un commutateur ?",
       opts:["config-register","confreg","boot loader","boot system"],ans:[3],
       explain:"La commande <strong>boot system</strong> définit la variable BOOT. config-register et confreg gèrent le registre de configuration, boot loader gère le système de fichiers flash."},
      {q:"Qu'est-ce qu'un commutateur utilise pour localiser et charger l'image IOS ?",
       opts:["Fichier image IOS","Variable d'environnement BOOT","NVRAM","Configuration initiale","POST"],ans:[1],
       explain:"La variable d'environnement <strong>BOOT</strong> contient l'emplacement du fichier image IOS."},
      {q:"Quel protocole renforce la sécurité des connexions à distance ?",
       opts:["SSH","HTTP","NetBEUI","FTP","POP"],ans:[0],
       explain:"<strong>SSH</strong> (Secure Shell) permet des connexions sécurisées et chiffrées aux périphériques réseau."},
      {q:"Quelle caractéristique décrit la commutation cut-through ?",
       opts:["Seules les trames sortantes subissent une vérification d'erreurs","Fragments exempts d'erreurs transmis avec faible latence","Trames transmises sans aucune vérification d'erreurs","Mise en mémoire tampon pour différentes vitesses Ethernet"],ans:[2],
       explain:"La commutation <strong>cut-through</strong> transmet dès la lecture de la MAC destination, sans vérification d'erreur (pas de FCS)."},
      {q:"Quelle est la différence significative entre un hub et un commutateur LAN de couche 2 ?",

function imgBlock(q){
  if(!q.img) return '';
  const desc = q.imgFallback || "Image non disponible. Consultez ccnareponses.com pour voir l'illustration originale.";
  const cap = q.imgCap ? `<div class="qcard-img-cap">🖼 ${q.imgCap}</div>` : '';
  return `<div class="qcard-img">
    <img src="${q.img}" alt="${q.imgCap||'Illustration'}" onerror="this.classList.add('err')">
    <div class="img-fallback">
      <div class="img-fb-icon">🖼️</div>
      <div class="img-fb-title">⚠ IMAGE NON DISPONIBLE</div>
      <div class="img-fb-desc">${desc}</div>
      <a class="img-fb-link" href="https://ccnareponses.com" target="_blank" rel="noopener">🔗 Voir sur ccnareponses.com</a>
    </div>
    ${cap}
  </div>`;
}

function buildNav(){
  const nav=document.getElementById('navExams');
  nav.innerHTML='<button class="nav-btn active" onclick="showDashboard()" id="nav-home">🏠 Accueil</button>';
  nav.innerHTML+='<button class="nav-btn lessons-nb" onclick="showLessonsPage()" id="nav-lessons">📚 Leçons</button>';
  EXAMS.forEach(e=>{
    nav.innerHTML+=`<button class="nav-btn" onclick="showExam('${e.id}')" id="nav-${e.id}">${e.short}</button>`;
  });
}

  const sb=document.getElementById('sidebar');
  sb.innerHTML=`<div class="sidebar-title">NAVIGATION</div>

    <div style="height:.5rem"></div>
    <div class="sidebar-title">EXAMENS CHECKPOINT</div>`;
  EXAMS.filter(e=>e.tagClass==='tag-cp').forEach(e=>{
    sb.innerHTML+=`<div class="sidebar-item" onclick="showExam('${e.id}')" id="sb-${e.id}">

let currentExamId=null;

function showExam(id){
  currentExamId=id;
  setActiveNav(id);
  const exam=EXAMS.find(e=>e.id===id);
  if(state[id].done){showResults(id);return;}
  renderExam(exam);
}

function renderExam(exam){
  const st=state[exam.id];
  const q=exam.questions[st.cur];
  const pct=Math.round(st.cur/exam.questions.length*100);
  const isMulti=q.multi===true;

  const img=imgBlock(q);

  const L=['A','B','C','D','E','F','G','H'];
  const optsHtml=q.opts.map((o,i)=>{
    if(isMulti) return `<button class="opt" onclick="sel('${exam.id}',${i})" id="o${i}"><div class="chk" id="chk${i}"></div><span>${o}</span></button>`;
    return `<button class="opt" onclick="sel('${exam.id}',${i})" id="o${i}"><div class="opt-ic">${L[i]}</div><span>${o}</span></button>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="exam-header">
      <div class="exam-title"><span class="tag ${exam.tagClass}">${exam.tag}</span>${exam.title}</div>
      <div class="exam-meta">
        <span>${exam.questions.length} questions</span>
        <span>Score: ${st.score}/${st.answered}</span>
      </div>
      <div class="progress-row">
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="progress-text">${st.cur+1}/${exam.questions.length}</div>
      </div>
    </div>
    <div class="qcard" id="qcard">
      <div class="qcard-num">Q${st.cur+1} ${isMulti?'<span class="qcard-multi-tag">CHOIX MULTIPLE</span>':''}</div>
      <div class="qcard-text">${q.q}</div>
      ${img}
      <div class="opts">${optsHtml}</div>
      <div class="feedback" id="fb"></div>
      <div class="qcard-actions">
        <button class="btn-val" id="btnVal" onclick="validate('${exam.id}')" disabled>Valider</button>
        <button class="btn-next" id="btnNext" onclick="nextQ('${exam.id}')">${st.cur<exam.questions.length-1?'Suivant →':'Résultats'}</button>
      </div>
    </div>`;
  st.answered_cur=false;
  st.selected=new Set();
}

function sel(examId,i){
  const st=state[examId];
  if(st.answered_cur)return;
  const exam=EXAMS.find(e=>e.id===examId);
  const q=exam.questions[st.cur];
  const isMulti=q.multi===true;
  if(isMulti){
    const el=document.getElementById('o'+i),ch=document.getElementById('chk'+i);
    if(st.selected.has(i)){st.selected.delete(i);el.classList.remove('sel');ch.textContent='';}
    else{st.selected.add(i);el.classList.add('sel');ch.textContent='✓';}
    document.getElementById('btnVal').disabled=st.selected.size===0;
  } else {
    document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    document.getElementById('o'+i).classList.add('sel');
    st.selected=new Set([i]);
    document.getElementById('btnVal').disabled=false;
  }
}

function validate(examId){
  const st=state[examId];
  if(st.answered_cur)return;
  st.answered_cur=true;
  const exam=EXAMS.find(e=>e.id===examId);
  const q=exam.questions[st.cur];
  const correct=new Set(q.ans);
  const ok=st.selected.size===correct.size&&[...st.selected].every(x=>correct.has(x));

  q.opts.forEach((_,i)=>{
    const el=document.getElementById('o'+i);
    if(!el)return;
    el.classList.add('disabled');
    if(correct.has(i))el.classList.add('correct');
    else if(st.selected.has(i))el.classList.add('wrong');
    if(q.multi){const ch=document.getElementById('chk'+i);if(ch)ch.textContent=(correct.has(i)||st.selected.has(i))?'✓':'';}
  });

  if(ok)st.score++;
  st.answered++;
  updateScore();

  const fb=document.getElementById('fb');
  fb.className=`feedback show ${ok?'ok':'ko'}`;
  fb.innerHTML=`<div class="feedback-title">${ok?'✅ Correct !':'❌ Incorrect'}</div>${q.explain}`;
  document.getElementById('btnVal').style.display='none';
  document.getElementById('btnNext').classList.add('show');
}

function nextQ(examId){
  const st=state[examId];
  const exam=EXAMS.find(e=>e.id===examId);
  if(st.cur<exam.questions.length-1){st.cur++;renderExam(exam);}
  else{st.done=true;showResults(examId);}
}

function showResults(examId){
  const st=state[examId];
  const exam=EXAMS.find(e=>e.id===examId);
  const pct=Math.round(st.score/exam.questions.length*100);
  const stars=pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
  const emoji=pct>=80?'🎉':pct>=60?'👍':'📚';
  const msg=pct>=80?'Excellent travail ! Tu es prêt(e) !':pct>=60?'Bien ! Encore quelques révisions...':'Consulte le cours et réessaie !';

  document.getElementById('content').innerHTML=`
    <div class="exam-header">
      <div class="exam-title"><span class="tag ${exam.tagClass}">${exam.tag}</span>${exam.title}</div>
    </div>
    <div class="results">
      <div class="res-emoji">${emoji}</div>
      <div class="res-score">${st.score}/${exam.questions.length}</div>
      <div class="res-pct">${pct}% de bonnes réponses</div>
      <div class="res-stars">${stars}</div>
      <div class="res-msg">${msg}</div>
      <button class="btn-restart" onclick="restartExam('${examId}')">🔄 Recommencer cet examen</button>
    </div>`;
}

function restartExam(examId){
  state[examId]={cur:0,score:0,answered:0,answered_cur:false,selected:new Set(),done:false};
  showExam(examId);
}

• <strong>Instabilité MAC</strong> : les adresses MAC "sautent" entre les ports<br>

<h3>Solution : STP bloque les ports redondants</h3>

  LESSONS.forEach(mod => {
    nav += `<div class="lessons-nav-title">${mod.title.split('–')[0].trim()}</div>`;
    nav += `<div class="lnav-item" onclick="selectLesson('${mod.id}',0)" id="lnav-${mod.id}">${mod.title.replace(/^[^–]+–\s*/,'')}</div>`;
    if(currentLessonId===mod.id){
      mod.chapters.forEach((ch,i)=>{
        nav += `<div class="lnav-chapter ${i===currentChapterIdx?'active':''}" onclick="selectLesson('${mod.id}',${i})" id="lnav-${mod.id}-${i}">→ ${ch.title}</div>`;
      });
    }
  });

  // Build content
  let content = '';
  if(!currentLessonId){
    // Welcome page
    content = `<div class="lesson-section">
      <h2>📚 Leçons CCNA2 SRWE</h2>
      <p>Sélectionne un module dans le menu de gauche pour commencer à apprendre. Chaque module contient des explications détaillées, des définitions d'abréviations, des tableaux récapitulatifs et des exemples de commandes IOS.</p>
      <div class="ls-table-wrap"><table class="ls-table">
        <tr><th>Module</th><th>Chapitres</th></tr>
        ${LESSONS.map(m=>`<tr><td style="cursor:pointer;color:var(--accent)" onclick="selectLesson('${m.id}',0)">${m.title}</td><td>${m.chapters.length} chapitres</td></tr>`).join('')}
      </table></div>
    </div>`;
  } else {
    const mod = LESSONS.find(m=>m.id===currentLessonId);
    content = `<div class="lesson-section">
      <h2>${mod.title}</h2>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem">
        ${mod.chapters.map((ch,i)=>`<button onclick="selectLesson('${mod.id}',${i})" 
          style="padding:.35rem .8rem;border-radius:6px;border:1px solid ${i===currentChapterIdx?'var(--accent)':'var(--border)'};background:${i===currentChapterIdx?'rgba(0,212,255,.12)':'var(--s2)'};color:${i===currentChapterIdx?'var(--accent)':'var(--muted)'};cursor:pointer;font-size:.75rem;font-family:var(--sans)">
          ${ch.title}</button>`).join('')}
      </div>
      ${mod.chapters[currentChapterIdx].content}
      <div style="display:flex;justify-content:space-between;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)">
        ${currentChapterIdx>0?`<button onclick="selectLesson('${mod.id}',${currentChapterIdx-1})" style="padding:.5rem 1rem;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--text);cursor:pointer;font-family:var(--sans);font-size:.82rem">← Précédent</button>`:'<span></span>'}
        ${currentChapterIdx<mod.chapters.length-1?`<button onclick="selectLesson('${mod.id}',${currentChapterIdx+1})" style="padding:.5rem 1rem;border-radius:7px;border:none;background:var(--accent);color:#000;cursor:pointer;font-family:var(--sans);font-size:.82rem;font-weight:700">Suivant →</button>`:'<span style="color:var(--ok);font-size:.82rem">✅ Module terminé</span>'}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="lessons-layout" style="height:calc(100vh - 60px);margin:-1.5rem">
      <div class="lessons-nav" id="lessonsNav">${nav}</div>
      <div class="lessons-content">${content}</div>
    </div>`;
}

function selectLesson(modId, chIdx){
  currentLessonId = modId;
  currentChapterIdx = chIdx;
  buildLessonsLayout();
  // Scroll to top
  const lc = document.querySelector('.lessons-content');
  if(lc) lc.scrollTop = 0;
}

</script>
</body>
</html>
